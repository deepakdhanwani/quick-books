spring:
  application:
    name: quick-books-api
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/quickbooks}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml

server:
  port: ${SERVER_PORT:9090}

app:
  jwt:
    secret: ${JWT_SECRET:quickbooks-dev-secret-change-in-production-min-32-chars}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  admin:
    auto-create: ${ADMIN_AUTO_CREATE:true}
    email: ${ADMIN_EMAIL:}
    password: ${ADMIN_PASSWORD:}
    name: ${ADMIN_NAME:Platform Admin}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:9091,http://localhost:9092}

logging:
  level:
    com.quickbooks: INFO
